name: Bug report
description: Report a defect in a lab sub-project
labels: ["bug"]
body:
  - type: dropdown
    id: subproject
    attributes:
      label: Sub-project
      options:
        - ai-freedom-manifesto
        - ai-human-collaboration-playbook
        - allergen-guard
        - frost-core
        - frost-dashboard
        - notification-service
        - plagiarism-coach
        - taskflow
        - telerithm-playground
        - other / unsure
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Expected vs. actual behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal commands or actions that trigger the bug.
      render: bash
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "OS, runtime version (Node/Python/etc.)"
