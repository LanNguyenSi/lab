name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  node:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - allergen-guard
          - frost-core
          - frost-dashboard
          - plagiarism-coach
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
